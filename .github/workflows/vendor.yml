on:
  workflow_dispatch:
  push:
    tags:
      - "*"

name: Vendored Release

jobs:
  vendored-release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Vendored Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install cargo-vendor-filterer
        run: cargo install cargo-vendor-filterer
      - name: Create vendored sources
        run: build-aux/dist-vendor.sh ../ src
        shell: bash
      - name: Archive repository
        run: git archive --format tar HEAD > tkshare-${{ github.ref_name }}.tar
      - name: Add vendored sources and cargo config to tarball
        run: tar -rf tkshare-${{ github.ref_name }}.tar .cargo vendor-crates
      - name: Compress tarball
        run: xz -z tkshare-${{ github.ref_name }}.tar
      - name: Generate checksum
        run: sha256sum tkshare-${{ github.ref_name }}.tar.xz > tkshare-${{ github.ref_name }}.tar.xz.sha256sum
      - name: Install xmllint & pandoc
        run: sudo apt-get install -y libxml2-utils pandoc
      - name: Extract release notes
        run: |
          changelog_version=$(xmllint --xpath 'string(//release[1]/@version)' data/io.github.NRTakeda.TKShare.releases.xml.in.in)
          # The git tag is prefixed with "v" (e.g. v0.6.2) while the changelog
          # version is not (0.6.2); strip the prefix before comparing.
          tag_version="${{ github.ref_name }}"
          tag_version="${tag_version#v}"
          echo "Changelog version: $changelog_version"
          echo "Git tag (normalized): $tag_version"
          if [ "$changelog_version" = "$tag_version" ]; then
            {
              echo 'RELEASE_NOTES<<EOF'
              xmllint --xpath '//release[1]/description' data/io.github.NRTakeda.TKShare.releases.xml.in.in \
                | xmllint --format - \
                | pandoc -f html -t markdown --wrap=none
              echo EOF
            } >> "$GITHUB_ENV"
          else
            echo "RELEASE_NOTES=" >> "$GITHUB_ENV"
          fi
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ env.RELEASE_NOTES }}
          prerelease: ${{ contains(github.ref, 'beta') }}
          files: |
            tkshare-${{ github.ref_name }}.tar.xz
            tkshare-${{ github.ref_name }}.tar.xz.sha256sum
